# version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Finance Sentiment Intelligence — Monitoring Stack
#
# Services:
#   app          → FastAPI backend (your Python app)
#   prometheus   → Scrapes /metrics every 15s
#   grafana      → Dashboards at http://localhost:3000 (admin/admin)
#   pushgateway  → Receives metrics from short-lived jobs (scraper, trainer)
#
# Usage:
#   docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI app ─────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: sentiment_app
    ports:
      - "8000:8000"
    environment:
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET}
      - REDDIT_USER_AGENT=${REDDIT_USER_AGENT}
    volumes:
      - ./data:/app/data
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sentiment_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - monitoring
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: sentiment_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/reddit_scraper.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitoring
    restart: unless-stopped

  # ── Pushgateway ─────────────────────────────────────────────────────────────
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: sentiment_pushgateway
    ports:
      - "9091:9091"
    networks:
      - monitoring
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  prometheus_data:
  grafana_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  monitoring:
    driver: bridge